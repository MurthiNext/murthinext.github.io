<style>
:root {
    --bg-page: #faf9f7;
    --bg-gradient-page: linear-gradient(135deg, #d8e8c0 0%, #f5efe0 40%, #cfe0b6 65%, #f5efe0 100%);
    --bg-card: #ffffff;
    --border-card: #e5e0d8;
    --border-light: #f0ece6;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.10);
    --text-primary: #1f2937;
    --text-secondary: #8b8680;
    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --transition-fast: 0.2s ease;
    --transition-normal: 0.3s ease;
}

[data-color-mode="dark"] {
    --bg-page: #0d1117;
    --bg-gradient-page: linear-gradient(135deg, #1a1a2e, #16213e 50%, #0f3460);
    --bg-card: #161b22;
    --border-card: #30363d;
    --border-light: #21262d;
    --text-primary: #c9d1d9;
    --text-secondary: #8b949e;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
}

html {
    min-height: 100vh;
    background: var(--bg-gradient-page);
    background-attachment: fixed;
    transition: background var(--transition-normal);
}

body {
    box-sizing: border-box;
    min-width: 200px;
    max-width: 900px;
    min-height: calc(100vh - 60px);
    margin: 20px auto 40px;
    padding: 45px;
    font-size: 16px;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'WenQuanYi Micro Hei', sans-serif;
    line-height: 1.25;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(210,200,180,0.3);
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    transition: color var(--transition-normal), background var(--transition-normal), box-shadow var(--transition-normal);
    display: flex;
    flex-direction: column;
}

[data-color-mode="dark"] body {
    background: rgba(22,27,34,0.45);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 40px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.25);
}

#content {
    flex: 1;
}

#header {
    display: flex;
    padding: 14px 20px;
    margin-bottom: 16px;
    background: rgba(250,247,240,0.55);
    border-radius: var(--radius-lg);
    transition: box-shadow var(--transition-fast), transform var(--transition-fast);
}

[data-color-mode="dark"] #header {
    background: rgba(255,255,255,0.04);
}

#header:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-1px);
}

#footer {
    margin-top: 0;
    padding-top: 32px;
    text-align: center;
    font-size: small;
    color: var(--text-secondary);
}

#footer a {
    color: inherit;
}
</style>

<style>
.avatar {

}
.title-left a {

.SideNav-item:last-child {

}
.SideNav-icon {

}
.SideNav-item {

}
.listLabels {

}
.listLabels object {
    max-height: 16px;
    max-width: 24px;
}

.paginate-container .pagination a,
.paginate-container .pagination span {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid var(--border-card);
    background: var(--bg-card);
    transition: all var(--transition-fast);
}
.paginate-container .pagination span[aria-disabled="true"] {
    opacity: 0.4;
    cursor: default;
}
#content > div:first-child {
    color: var(--text-secondary);
    font-size: 13px;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
    body { padding: 16px; margin: 12px auto 24px; border-radius: 14px; min-height: calc(100vh - 36px); }
    .title-left {
        display: flex;
        align-items: center;
        min-width: 0;

    .avatar { width: 34px; height: 34px; }
    .blogTitle {

        text-overflow: ellipsis;
        white-space: nowrap;

    .LabelTime { display: inline-block; font-size: 11px; }
    .title-right .circle { width: 34px; height: 34px; }
    .SideNav-item {

        align-items: flex-start;
        justify-content: flex-start;
        gap: 6px;
        padding: 12px;
        margin-top: 4px;

        border-bottom: none;

    .SideNav-item > .d-flex {

    }
    [data-color-mode="dark"] .SideNav-item {
        background: rgba(255,255,255,0.03);
        box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .SideNav { min-width: 0; }
    .listTitle {
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        text-align: left;
    }
    .listLabels {
        width: 100%;
        flex-wrap: wrap;
        gap: 4px;
    }
    .listLabels .LabelTime {
        margin-left: auto;
    }
    .paginate-container .pagination a,
    .paginate-container .pagination span {
        padding: 6px 16px;
        font-size: 12px;
    }
}

@media (hover: hover) {
    .avatar:hover {
        transform: scale(1.1) rotate(8deg);

    .title-right .circle:hover {
        border-color: #c5bfb6;

        transform: scale(1.08);

    }
    .paginate-container .pagination a:hover {
        border-color: #c5bfb6;
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
    }
}
@media (hover: none) {
    .SideNav-item:active { background: var(--bg-card); }
    .title-right .circle:active {
        transform: scale(0.95);
        background: var(--border-light);
    }
}
</style>

var utterancesLoad=0;

let themeSettings={
    "dark": ["dark","moon","#00f0ff","dark-blue"],
    "light": ["light","sun","#ff5000","github-light"],
    "auto": ["auto","sync","","preferred-color-scheme"]
};
function changeTheme(mode, icon, color, utheme){
    let resolved = mode === "auto"
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? "dark" : "light")
        : mode;
    document.documentElement.setAttribute("data-color-mode", resolved);
    document.documentElement.setAttribute("data-user-theme", mode);
    document.getElementById("themeSwitch").setAttribute("d",value=IconList[icon]);
    document.getElementById("themeSwitch").parentNode.style.color=color;
    if(utterancesLoad==1){utterancesTheme(utheme);}
}
function modeSwitch(){
    let currentMode = document.documentElement.getAttribute('data-user-theme') || localStorage.getItem("meek_theme") || "light";
    let newMode = currentMode === "light" ? "dark" : currentMode === "dark" ? "auto" : "light";
    localStorage.setItem("meek_theme", newMode);
    if(themeSettings[newMode]){
        changeTheme(...themeSettings[newMode]);
    }
}
function utterancesTheme(theme){
    const message={type:'set-theme',theme: theme};
    const iframe=document.getElementsByClassName('utterances-frame')[0];
