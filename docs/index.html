<style>
:root {
    --bg-page: #FAF7F0;
    --bg-panel: #FFFFFF;
    --bg-surface: #F5F2EB;
    --border-primary: #D8D2C6;
    --border-secondary: #E8E2D6;
    --text-primary: #0A0C10;
    --text-secondary: #6B7280;
    --text-tertiary: #9CA3AF;
    --accent: #0055FF;
    --accent-hover: #0044CC;
    --accent-subtle: rgba(0, 85, 255, 0.08);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.06);
    --transition-fast: 0.15s ease;
    --transition-normal: 0.3s ease;
    --radius: 0px;
    --font-display: 'Space Grotesk', 'Noto Sans SC', sans-serif;
    --font-body: 'Inter', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

[data-color-mode="dark"] {
    --bg-page: #080C14;
    --bg-panel: #0D1117;
    --bg-surface: #0A0E16;
    --border-primary: #162033;
    --border-secondary: #1A1F2E;
    --text-primary: #E2E8F0;
    --text-secondary: #8B949E;
    --text-tertiary: #64748B;
    --accent: #00D4AA;
    --accent-hover: #00B894;
    --accent-subtle: rgba(0, 212, 170, 0.08);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.3);
}

html {
    min-height: 100vh;
    background-color: var(--bg-page);
    background-image:
        linear-gradient(var(--border-secondary) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-secondary) 1px, transparent 1px);
    background-size: 40px 40px;
    transition: background-color var(--transition-normal);
}

html[data-color-mode="dark"] {
    background-color: var(--bg-page);
    background-image: none;
    position: relative;
}

/* ===== JS 驱动淡雅星空层 ===== */
#universe {
    display: none;
}
html[data-color-mode="dark"] #universe {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: -1;
    overflow: hidden;
    background: var(--bg-page);
}

@keyframes starBreath {
    0% { opacity: 0.25; }
    100% { opacity: 0.55; }
}

body {
    box-sizing: border-box;
    min-width: 200px;
    max-width: 900px;
    min-height: 100vh;
    margin: 0 auto;
    padding: 32px 32px 48px 32px;
    font-size: 16px;
    font-family: var(--font-body);
    line-height: 1.6;
    background: var(--bg-page);
    color: var(--text-primary);
    border-left: 1px solid var(--border-primary);
    border-right: 1px solid var(--border-primary);
    transition: color var(--transition-normal), background var(--transition-normal);
    display: flex;
    flex-direction: column;
}

html[data-color-mode="dark"] body {
    background: var(--bg-panel);
}

#content {
    flex: 1;
    position: relative;
    z-index: 1;
}

#header {
    display: flex;
    align-items: center;
    padding: 12px 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border-primary);
    position: relative;
    transition: border-color var(--transition-normal);
}

#header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 1px;
    background: transparent;
    pointer-events: none;
}

[data-color-mode="dark"] #header::after {
    background: linear-gradient(90deg, transparent 0%, var(--accent) 20%, var(--accent) 80%, transparent 100%);
    background-size: 200% 100%;
    animation: scanline 4s linear infinite;
}

@keyframes scanline {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

#footer {
    margin-top: auto;
    padding-top: 32px;
    padding-bottom: 32px;
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    border-top: 1px solid var(--border-primary);
    transition: color var(--transition-normal), border-color var(--transition-normal);
    position: relative;
    z-index: 1;
}

#footer a {
    color: inherit;
    text-decoration: none;
    transition: color var(--transition-fast);
}

#footer a:hover {
    color: var(--accent);
}

@media (prefers-reduced-motion: reduce) {
    [data-color-mode="dark"] #header::after {
        animation: none !important;
    }
}

@media (max-width: 600px) {
    body { padding: 20px 20px 32px 20px; margin: 0 auto; min-height: 100vh; }
    #header { padding: 10px 0; margin-bottom: 16px; }
}
</style>

<style>
#content {
    display: flex;
    flex-direction: column;

}
.avatar {

    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;

.SideNav {

.SideNav-item:first-child {
    border-top: 1px solid var(--border-secondary);
}

html[data-color-mode="dark"] .SideNav-item {

}
.SideNav-item::before {
    content: '';

    left: 0;
    top: 0;

    letter-spacing: 0.02em;

}
.d-flex {

}
.listTitle {
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    max-width: 100%;
    color: var(--text-primary);
    font-size: 15px;
    font-weight: 500;
    font-family: var(--font-body);
}
.listLabels {
    white-space: nowrap;
    display: flex;
    align-items: center;
}
.listLabels object {
    max-height: 16px;
    max-width: 24px;
}

.paginate-container {
    margin-top: 24px;
}
.paginate-container .pagination a,
.paginate-container .pagination span {
    padding: 8px 20px;
    border-radius: 0;
    border: 1px solid var(--border-primary);
    background: var(--bg-panel);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    transition: all var(--transition-fast);
    text-decoration: none;
}
.paginate-container .pagination span[aria-disabled="true"] {
    opacity: 0.4;
    cursor: default;
    border-color: var(--border-secondary);
    background: var(--bg-surface);
}
#content > div:first-child {
    color: var(--text-secondary);
    font-size: 13px;
    margin-bottom: 20px;
    font-family: var(--font-body);
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
    .title-left {
        display: flex;
        align-items: center;
        min-width: 0;
    }
    .avatar { width: 36px; height: 36px; }
    .blogTitle {
        font-size: 16px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-left: 8px;
    }
    #buttonRSS { display: none; }
    .LabelTime { display: inline-block; font-size: 11px; }
    .title-right .circle { width: 34px; height: 34px; }
    .SideNav-item {

        align-items: flex-start;
        justify-content: flex-start;
        gap: 8px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border-secondary);
    }
    .SideNav-item > .d-flex {
        width: 100%;
    }
    .SideNav { min-width: 0; }
    .listTitle {
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        text-align: left;
        font-size: 14px;
    }
    .listLabels {
        width: 100%;
        flex-wrap: wrap;
        gap: 4px;
    }
    .listLabels .LabelTime {
        margin-left: auto;
    }
    .paginate-container .pagination a,
    .paginate-container .pagination span {
        padding: 6px 16px;
        font-size: 13px;
    }

@media (prefers-reduced-motion: reduce) {
    .SideNav-item {
        animation: none;
    }

@media (hover: hover) {
    .avatar:hover {
        transform: scale(1.05);
    }
    .SideNav-item:hover {
        background: var(--bg-surface);
        padding-left: 12px;
    }
    .title-right .circle:hover {
        border-color: var(--accent);
        color: var(--accent);
        box-shadow: var(--shadow-sm);

    .paginate-container .pagination a:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-subtle);

@media (hover: none) {
    .SideNav-item:active { background: var(--bg-surface); }
    html[data-color-mode="dark"] .SideNav-item:active {
        background: var(--bg-surface);
    }
    .title-right .circle:active {
        transform: scale(0.95);
        background: var(--bg-surface);
    }
}
</style>

var utterancesLoad=0;

let themeSettings={
    "dark": ["dark","moon","#00D4AA","dark-blue"],
    "light": ["light","sun","#6B7280","github-light"],
    "auto": ["auto","sync","#6B7280","preferred-color-scheme"]
};
function changeTheme(mode, icon, color, utheme){
    let resolved = mode === "auto"
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? "dark" : "light")
        : mode;
    document.documentElement.setAttribute("data-color-mode", resolved);
    document.documentElement.setAttribute("data-user-theme", mode);
    document.getElementById("themeSwitch").setAttribute("d",value=IconList[icon]);
    document.getElementById("themeSwitch").parentNode.style.color=color;
    if(utterancesLoad==1){utterancesTheme(utheme);}
}
function modeSwitch(){
    let currentMode = document.documentElement.getAttribute('data-user-theme') || localStorage.getItem("meek_theme") || "light";
    let newMode = currentMode === "light" ? "dark" : currentMode === "dark" ? "auto" : "light";
    localStorage.setItem("meek_theme", newMode);
    if(themeSettings[newMode]){
        changeTheme(...themeSettings[newMode]);
    }
}
function utterancesTheme(theme){
    const message={type:'set-theme',theme: theme};
    const iframe=document.getElementsByClassName('utterances-frame')[0];
    iframe.contentWindow.postMessage(message,'https://utteranc.es');
}
if(themeSettings[theme]){changeTheme(...themeSettings[theme]);}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    var userTheme = document.documentElement.getAttribute("data-user-theme")
        || localStorage.getItem("meek_theme")
        || "light";
    if (userTheme === "auto") {
        document.documentElement.setAttribute("data-color-mode", e.matches ? "dark" : "light");
    }
});
// 极简星空生成器
(function createStarfield() {
    const container = document.getElementById('universe');
    if (!container) return;

    const STAR_COUNT = 240;

    function random(min, max) { return Math.random() * (max - min) + min; }

    function fillStars() {
        container.innerHTML = '';
        const w = window.innerWidth;
        const h = window.innerHeight;
        // 深空底色
        container.style.background = 'var(--bg-page)';

        const frag = document.createDocumentFragment();
        for (let i = 0; i < STAR_COUNT; i++) {
            const star = document.createElement('div');
            const size = random(0.5, 2.3);
            const x = random(0, w);
            const y = random(0, h);
            const baseOp = random(0.15, 0.40);
            const dur = random(4, 9);
            const delay = random(0, 5);

            star.style.cssText = (
                'position:absolute;' +
                'left:' + x + 'px;' +
                'top:' + y + 'px;' +
                'width:' + size + 'px;' +
                'height:' + size + 'px;' +
                'border-radius:50%;' +
                'background:rgba(255,255,255,' + baseOp.toFixed(2) + ');' +
                'animation:starBreath ' + dur.toFixed(1) + 's ease-in-out ' + delay.toFixed(1) + 's infinite alternate;'
            );
            frag.appendChild(star);
        }
        container.appendChild(frag);
    }

    // 仅暗色模式才渲染
    function isDark() {
        return document.documentElement.getAttribute('data-color-mode') === 'dark';
    }

    function maybeFill() {
        if (isDark()) fillStars();
        else container.innerHTML = '';
    }

    // 初始化
    maybeFill();

    // 监听主题切换
    const observer = new MutationObserver(function(mutations) {
        for (const m of mutations) {
            if (m.type === 'attributes' && m.attributeName === 'data-color-mode') {
                maybeFill();
                return;
            }
        }
    });
    observer.observe(document.documentElement, { attributes: true });

    // 窗口 resize 防抖重绘
    let resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(maybeFill, 200);
    });
})();
